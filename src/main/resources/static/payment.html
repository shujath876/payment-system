<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment System</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1a1a2e;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus, select:focus {
            border-color: #635bff;
        }

        #card-element {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
        }

        #card-element.StripeElement--focus {
            border-color: #635bff;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #635bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        button:hover {
            background: #4f46e5;
        }

        button:disabled {
            background: #a0a0a0;
            cursor: not-allowed;
        }

        #message {
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            font-size: 15px;
            display: none;
        }

        #message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        #message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .payment-id {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💳 Payment System</h2>

    <div class="form-group">
        <label>Merchant ID</label>
        <input type="text" id="merchantId" placeholder="e.g. Freshbasket_01" />
    </div>

    <div class="form-group">
        <label>Customer Email</label>
        <input type="email" id="customerEmail" placeholder="e.g. anil@gmail.com" />
    </div>

    <div class="form-group">
        <label>Amount (INR)</label>
        <input type="number" id="amount" placeholder="e.g. 500" min="1" />
    </div>

    <div class="form-group">
        <label>Currency</label>
        <select id="currency">
            <option value="INR">INR - Indian Rupee</option>
            <option value="USD">USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="AED">AED - UAE Dirham</option>
        </select>
    </div>

    <div class="form-group">
        <label>Description</label>
        <input type="text" id="description" placeholder="e.g. Grocery Order" />
    </div>

    <div class="form-group">
        <label>Card Details</label>
        <div id="card-element"></div>
    </div>

    <button id="payButton" onclick="handlePayment()">Pay Now</button>

    <div id="message"></div>
</div>

<script>
    // Replace with your Stripe Publishable Key (pk_test_...)
    const stripe = Stripe('pk_test_51TeSvA24kLJl6IbQCdxo0B5Zu1rdQ3HIz1Yyz0TXmTqnOkjQ0VKrAEF5YAndPdRLrCgdiaUD1hTQIH2htDKxtt8j0082FMxPiq');
    const elements = stripe.elements();

    // Mount Stripe card element
    const cardElement = elements.create('card', {
        style: {
            base: {
                fontSize: '15px',
                color: '#333',
                '::placeholder': { color: '#aaa' }
            }
        }
    });
    cardElement.mount('#card-element');

    async function handlePayment() {
        const button = document.getElementById('payButton');
        const messageDiv = document.getElementById('message');

        // Get form values
        const merchantId = document.getElementById('merchantId').value.trim();
        const customerEmail = document.getElementById('customerEmail').value.trim();
        const amount = document.getElementById('amount').value.trim();
        const currency = document.getElementById('currency').value;
        const description = document.getElementById('description').value.trim();

        // Basic frontend validation
        if (!merchantId || !customerEmail || !amount || !description) {
            showMessage('Please fill in all fields.', 'error');
            return;
        }

        button.disabled = true;
        button.textContent = 'Processing...';
        messageDiv.style.display = 'none';

        try {
            // Step 1 — Call your backend to create PaymentIntent
            const response = await fetch('http://localhost:8080/api/payments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    merchantId,
                    customerEmail,
                    amount: parseFloat(amount),
                    currency,
                    description
                })
            });

            const data = await response.json();

            if (!response.ok) {
                showMessage(data.error || 'Payment initiation failed.', 'error');
                resetButton();
                return;
            }

            const clientSecret = data.stripeClientSecret;
            const paymentId = data.paymentId;

            // Step 2 — Confirm payment with Stripe using card details
            const { error, paymentIntent } = await stripe.confirmCardPayment(
                clientSecret,
                {
                    payment_method: {
                        card: cardElement,
                        billing_details: { email: customerEmail }
                    }
                }
            );

            if (error) {
                showMessage('Payment failed: ' + error.message, 'error');
            } else if (paymentIntent.status === 'succeeded') {
                showMessage(
                    '✅ Payment Successful! Your transaction has been processed.',
                    'success'
                );
                document.querySelector('.payment-id') &&
                document.querySelector('.payment-id').remove();
                const idNote = document.createElement('div');
                idNote.className = 'payment-id';
                idNote.textContent = 'Payment ID: ' + paymentId +
                    ' | Stripe ID: ' + paymentIntent.id;
                document.getElementById('message').after(idNote);
            }

        } catch (err) {
            showMessage('Something went wrong. Please try again.', 'error');
            console.error(err);
        }

        resetButton();
    }

    function showMessage(text, type) {
        const messageDiv = document.getElementById('message');
        messageDiv.textContent = text;
        messageDiv.className = type;
        messageDiv.style.display = 'block';
    }

    function resetButton() {
        const button = document.getElementById('payButton');
        button.disabled = false;
        button.textContent = 'Pay Now';
    }
</script>

</body>
</html>
